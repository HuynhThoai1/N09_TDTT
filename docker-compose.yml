version: '3.8'

services:
  # 1. Cơ sở dữ liệu PostgreSQL tích hợp pgvector cho AI
  db:
    image: ankane/pgvector:latest
    container_name: n09_tdtt_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=n09_tdtt_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # 2. Engine bản đồ OSRM (Sử dụng dữ liệu trong thư mục ./osrm_data)
  osrm:
    image: osrm/osrm-backend
    container_name: n09_tdtt_osrm
    ports:
      - "5000:5000"
    volumes:
      - ./osrm_data:/data
    # Lệnh chạy server sau khi đã giải nén bản đồ vietnam-latest.osrm
    command: osrm-routed --algorithm mld /data/vietnam-latest.osrm
    restart: always

volumes:
  postgres_data:
