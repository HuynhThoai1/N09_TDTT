services:
  # Cơ sở dữ liệu PostgreSQL tích hợp pgvector cho AI
  db:
    image: ankane/pgvector:latest
    container_name: n09_tdtt_postgres
    ports:
      - "${DB_PORT:-5433}:5432"
    environment:
      - POSTGRES_DB=${DB_NAME:-n09_tdtt_db}
      - POSTGRES_USER=${DB_USER:-admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-admin_password}
    env_file:
      - backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
